<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground - Quill</title>
  <meta name="description" content="Write and run Quill code in your browser. No installation required.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪶</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ---- Reset & Base ---- */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --page-bg: #0D1117;
      --nav-bg: rgba(13, 17, 23, 0.8);
      --card-bg: #161B22;
      --card-bg-alt: #1C2128;
      --green: #1EB969;
      --blue: #198CD7;
      --text-primary: #E6EDF3;
      --text-secondary: #8B949E;
      --text-tertiary: #6E7681;
      --border: #30363D;
      --red: #F85149;
      --brand-gradient: linear-gradient(135deg, #1EB969, #198CD7);
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --nav-height: 65px;
    }

    html { font-size: 16px; height: 100%; }
    body {
      font-family: var(--font-body);
      background-color: var(--page-bg);
      color: var(--text-primary);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--green); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--blue); }

    /* ---- Navigation ---- */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-inner {
      width: 100%; max-width: 1400px;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-text { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); }
    .badge {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 999px;
      background: var(--brand-gradient); color: #fff; font-weight: 600;
    }
    .nav-links {
      list-style: none; display: flex; align-items: center; gap: 24px;
    }
    .nav-links a { color: var(--text-secondary); font-weight: 500; font-size: 0.95rem; }
    .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
    .nav-cta {
      background: var(--brand-gradient) !important; color: #fff !important;
      padding: 6px 16px; border-radius: 8px; font-weight: 600 !important;
    }
    .nav-hamburger {
      display: none; background: none; border: none; color: var(--text-primary);
      font-size: 1.5rem; cursor: pointer;
    }

    /* ---- Toolbar ---- */
    .toolbar {
      margin-top: var(--nav-height);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
    }
    .toolbar-title {
      font-size: 1.1rem; font-weight: 600; margin-right: auto;
      display: flex; align-items: center; gap: 8px;
    }
    .toolbar select {
      background: var(--card-bg-alt); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 12px; font-family: var(--font-body); font-size: 0.85rem;
      cursor: pointer; outline: none;
    }
    .toolbar select:focus { border-color: var(--green); }
    .toolbar select option { background: var(--card-bg-alt); }
    .btn {
      padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-run {
      background: var(--green); color: #fff; border-color: var(--green);
    }
    .btn-run:hover { background: #17a05a; border-color: #17a05a; }
    .btn-secondary { background: var(--card-bg-alt); color: var(--text-primary); }
    .btn-secondary:hover { background: var(--border); }

    /* ---- Main Panels ---- */
    .playground {
      flex: 1; display: flex; min-height: 0;
      overflow: hidden;
    }
    .panel {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0;
    }
    .panel-header {
      padding: 8px 16px; font-size: 0.8rem; font-weight: 600;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
      background: var(--card-bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header .clear-btn {
      background: none; border: none; color: var(--text-tertiary);
      font-size: 0.75rem; cursor: pointer; font-family: var(--font-body);
    }
    .panel-header .clear-btn:hover { color: var(--text-primary); }
    .divider {
      width: 1px; background: var(--border); cursor: col-resize;
      flex-shrink: 0;
    }
    .divider:hover { background: var(--green); }

    /* ---- Editor ---- */
    .editor-wrap {
      flex: 1; display: flex; overflow: auto;
      background: var(--page-bg); position: relative;
    }
    .line-numbers {
      padding: 12px 0; text-align: right; user-select: none;
      font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.6;
      color: var(--text-tertiary); min-width: 44px; padding-right: 12px;
      padding-left: 12px; background: var(--card-bg);
      border-right: 1px solid var(--border);
      flex-shrink: 0; white-space: pre; overflow: hidden;
      display: block;
    }
    .editor {
      flex: 1; padding: 12px 16px;
      font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.6;
      color: var(--text-primary); background: transparent;
      border: none; outline: none; resize: none;
      white-space: pre; overflow: auto;
      tab-size: 2; -moz-tab-size: 2;
    }

    /* ---- Output ---- */
    .output-wrap {
      flex: 1; overflow: auto; padding: 12px 16px;
      font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.6;
      background: var(--page-bg); white-space: pre-wrap; word-break: break-word;
    }
    .output-success { color: var(--green); }
    .output-error { color: var(--red); }
    .output-text { color: var(--text-primary); }
    .output-warn { color: #d29922; }

    /* ---- Footer ---- */
    .footer {
      padding: 12px 24px; text-align: center;
      font-size: 0.8rem; color: var(--text-tertiary);
      border-top: 1px solid var(--border);
      background: var(--card-bg);
    }
    .footer a { color: var(--text-secondary); }
    .footer a:hover { color: var(--green); }
    .footer-sep { margin: 0 8px; }

    /* ---- Toast ---- */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--card-bg-alt); color: var(--text-primary);
      padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 0.85rem; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 200;
    }
    .toast.show { opacity: 1; }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-hamburger { display: block; }
      .nav-links.open {
        display: flex; flex-direction: column;
        position: absolute; top: var(--nav-height); left: 0; right: 0;
        background: var(--nav-bg); backdrop-filter: blur(20px);
        padding: 16px 24px; gap: 12px;
        border-bottom: 1px solid var(--border);
      }
      .playground { flex-direction: column; }
      .divider { width: 100%; height: 1px; cursor: row-resize; }
      .toolbar-title { width: 100%; }
    }
  </style>
</head>

<script>
// ============================================================
// Quill Playground - In-Browser Compiler & Runtime
// ============================================================

// ---- Examples ----
const EXAMPLES = {
  hello: `say "Hello, World!"`,

  variables: `-- Variables and math
name is "Quill"
age is 3
pi is 3.14159

say "Name: {name}"
say "Age: {age}"
say "In 5 years: {age + 5}"
say "Pi: {pi}"

-- Math operations
x is 10
y is 3
say "x + y = {x + y}"
say "x - y = {x - y}"
say "x * y = {x * y}"
say "x / y = {x / y}"
say "x % y = {x % y}"`,

  functions: `-- Defining functions with "to"
to greet person:
  say "Hello, {person}!"

to add a, b:
  give back a + b

to factorial n:
  if n is less than 2:
    give back 1
  otherwise:
    give back n * factorial(n - 1)

-- Calling functions
greet("World")
greet("Quill")

result is add(10, 20)
say "10 + 20 = {result}"

say "5! = {factorial(5)}"
say "10! = {factorial(10)}"`,

  ifelse: `-- Conditional logic
temperature is 72

if temperature is greater than 90:
  say "It's hot outside!"
otherwise if temperature is greater than 70:
  say "It's a nice day."
otherwise if temperature is greater than 50:
  say "It's a bit cool."
otherwise:
  say "It's cold!"

-- Boolean logic
age is 25
has_license is yes

if age is greater than 16 and has_license:
  say "You can drive!"
otherwise:
  say "You cannot drive."

-- Checking values
value is nothing
if value is nothing:
  say "Value is nothing"`,

  loops: `-- While loops
say "Counting up:"
i is 0
repeat while i is less than 5:
  say "  i = {i}"
  i is i + 1

-- For each loops
say ""
say "Fruits:"
fruits is ["apple", "banana", "cherry"]
for each fruit in fruits:
  say "  I like {fruit}"

-- Nested loops
say ""
say "Multiplication table (1-3):"
for each x in [1, 2, 3]:
  for each y in [1, 2, 3]:
    say "  {x} * {y} = {x * y}"`,

  lists: `-- Creating lists
numbers is [10, 20, 30, 40, 50]
say "Numbers: {numbers}"
say "Length: {length(numbers)}"

-- Accessing items
say "First: {numbers[0]}"
say "Last: {numbers[4]}"

-- Adding items
push(numbers, 60)
say "After push: {numbers}"

-- Iterating
say ""
say "Doubled:"
for each n in numbers:
  say "  {n} * 2 = {n * 2}"

-- Working with strings
words is ["hello", "world", "quill"]
for each word in words:
  say "  {word} has {length(word)} characters"`,

  classes: `-- Defining a class with "describe"
describe Animal:
  to create name, sound:
    my name is name
    my sound is sound

  to speak:
    say "{my name} says {my sound}!"

  to describe:
    give back "{my name} the animal"

-- Creating instances
dog is Animal("Rex", "Woof")
cat is Animal("Whiskers", "Meow")

dog.speak()
cat.speak()

say dog.describe()
say cat.describe()

-- Another class
describe Counter:
  to create:
    my count is 0

  to increment:
    my count is my count + 1

  to get_value:
    give back my count

c is Counter()
c.increment()
c.increment()
c.increment()
say "Counter: {c.get_value()}"`,

  pattern: `-- Pattern matching with match/when
to describe_number n:
  match n:
    when 0:
      give back "zero"
    when 1:
      give back "one"
    when 2:
      give back "two"
    otherwise:
      give back "many"

say describe_number(0)
say describe_number(1)
say describe_number(2)
say describe_number(42)

-- More complex matching
to classify_age age:
  match age:
    when 0:
      give back "newborn"
    when 1:
      give back "infant"
    when 13:
      give back "new teenager"
    when 18:
      give back "new adult"
    otherwise:
      if age is less than 13:
        give back "child"
      otherwise if age is less than 20:
        give back "teenager"
      otherwise:
        give back "adult"

for each age in [0, 1, 5, 13, 16, 18, 25]:
  say "Age {age}: {classify_age(age)}"`,

  pipe: `-- Pipe operator: passes a value through functions
to double x:
  give back x * 2

to add_one x:
  give back x + 1

to square x:
  give back x * x

to show_result x:
  say "Result: {x}"
  give back x

-- Chaining with pipes
5 | double | add_one | show_result
-- 5 -> 10 -> 11

3 | square | double | show_result
-- 3 -> 9 -> 18

10 | add_one | add_one | add_one | show_result
-- 10 -> 11 -> 12 -> 13

-- Using pipes with text
to shout text:
  give back text + "!!!"

to greet_name name:
  give back "Hello, " + name

"World" | greet_name | shout | show_result`,

  concurrency: `-- Concurrency in Quill (simulated in playground)
-- In the real Quill runtime, these run in parallel

say "Starting tasks..."

to fetch_data source:
  say "  Fetching from {source}..."
  give back "Data from {source}"

to process item:
  say "  Processing: {item}"
  give back "Processed {item}"

-- Simulate spawn (runs sequentially in playground)
say ""
say "Fetching data:"
result1 is fetch_data("API")
result2 is fetch_data("Database")
result3 is fetch_data("Cache")

say ""
say "Processing results:"
say process(result1)
say process(result2)
say process(result3)

say ""
say "All tasks complete!"`,

  fullstack: `-- Full-Stack Quill App (conceptual demo)
-- Shows Quill's syntax for server, database, and components

say "=== Full-Stack Quill Demo ==="
say ""

-- Model
describe User:
  to create name, email:
    my name is name
    my email is email

  to display:
    say "  User: {my name} ({my email})"

-- Create some users
users is []
push(users, User("Alice", "alice@example.com"))
push(users, User("Bob", "bob@example.com"))
push(users, User("Charlie", "charlie@example.com"))

-- Display
say "Users in database:"
for each user in users:
  user.display()

-- Route handler simulation
to handle_request path:
  say ""
  say "GET {path}"
  match path:
    when "/":
      say "  -> Serving homepage"
    when "/users":
      say "  -> Listing {length(users)} users"
      for each user in users:
        user.display()
    when "/about":
      say "  -> Serving about page"
    otherwise:
      say "  -> 404 Not Found"

handle_request("/")
handle_request("/users")
handle_request("/about")
handle_request("/unknown")`
};

// ---- Quill Compiler ----
class QuillCompiler {
  compile(source) {
    const errors = [];
    try {
      const js = this.transpile(source, errors);
      return { js, errors };
    } catch (e) {
      errors.push(e.message);
      return { js: '', errors };
    }
  }

  transpile(source, errors) {
    // Normalize line endings
    let lines = source.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');

    // Process into a structured form with indent levels
    const processed = [];
    for (let i = 0; i < lines.length; i++) {
      const raw = lines[i];
      const stripped = raw.replace(/\t/g, '  ');
      const trimmed = stripped.trimStart();
      const indent = stripped.length - trimmed.length;
      const level = Math.floor(indent / 2);
      processed.push({ raw, trimmed, level, lineNum: i + 1 });
    }

    // Generate JS with indentation-based blocks
    const jsLines = [];
    const indentStack = [0]; // stack of indent levels for closing braces

    for (let i = 0; i < processed.length; i++) {
      const { trimmed, level, lineNum } = processed[i];

      // Skip empty lines
      if (trimmed === '') {
        jsLines.push('');
        continue;
      }

      // Close blocks: if current level <= previous block levels, close them
      while (indentStack.length > 1 && level <= indentStack[indentStack.length - 1]) {
        indentStack.pop();
        const closeIndent = '  '.repeat(indentStack.length - 1);
        jsLines.push(closeIndent + '}');
      }

      const jsIndent = '  '.repeat(indentStack.length - 1);

      // Check if next non-empty line has greater indentation (block opener)
      const opensBlock = this.nextNonEmptyLevel(processed, i) > level;

      const js = this.compileLine(trimmed, opensBlock, errors, lineNum);
      if (js !== null) {
        jsLines.push(jsIndent + js);
        if (opensBlock && (js.endsWith('{') || js.endsWith('{ // match'))) {
          indentStack.push(level + 1);
        } else if (opensBlock) {
          // Line should open a block but our compilation didn't add {
          // Try to detect and fix
        }
      }
    }

    // Close remaining open blocks
    while (indentStack.length > 1) {
      indentStack.pop();
      const closeIndent = '  '.repeat(indentStack.length - 1);
      jsLines.push(closeIndent + '}');
    }

    return jsLines.join('\n');
  }

  nextNonEmptyLevel(processed, currentIdx) {
    for (let j = currentIdx + 1; j < processed.length; j++) {
      if (processed[j].trimmed !== '') return processed[j].level;
    }
    return 0;
  }

  compileLine(line, opensBlock, errors, lineNum) {
    // Comments
    if (line.startsWith('--')) {
      return '//' + line.slice(2);
    }

    // Remove trailing colon for block openers
    let stmt = line;
    if (opensBlock && stmt.endsWith(':')) {
      stmt = stmt.slice(0, -1).trimEnd();
    }

    // Replace Quill keywords in expressions
    const compileExpr = (expr) => this.compileExpression(expr);

    // ---- describe ClassName (class) ----
    const describeMatch = stmt.match(/^describe\s+(\w+)$/);
    if (describeMatch) {
      return `class ${describeMatch[1]} {`;
    }

    // ---- to create (constructor) ----
    const createMatch = stmt.match(/^to\s+create(?:\s+(.*))?$/);
    if (createMatch) {
      const params = createMatch[1] ? createMatch[1].split(/\s*,\s*/).join(', ') : '';
      return `constructor(${params}) {`;
    }

    // ---- to functionName params (method/function) ----
    const fnMatch = stmt.match(/^to\s+(\w+)(?:\s+(.*))?$/);
    if (fnMatch) {
      const name = fnMatch[1];
      const params = fnMatch[2] ? fnMatch[2].split(/\s*,\s*/).join(', ') : '';
      // If inside a class, no "function" keyword
      return `function ${name}(${params}) {`;
    }

    // ---- give back (return) ----
    const returnMatch = stmt.match(/^give\s+back\s+(.+)$/);
    if (returnMatch) {
      return `return ${compileExpr(returnMatch[1])};`;
    }

    // ---- say (print) ----
    const sayMatch = stmt.match(/^say\s+(.+)$/);
    if (sayMatch) {
      return `console.log(${compileExpr(sayMatch[1])});`;
    }

    // ---- for each x in y ----
    const forMatch = stmt.match(/^for\s+each\s+(\w+)\s+in\s+(.+)$/);
    if (forMatch) {
      return `for (const ${forMatch[1]} of ${compileExpr(forMatch[2])}) {`;
    }

    // ---- repeat while condition ----
    const whileMatch = stmt.match(/^repeat\s+while\s+(.+)$/);
    if (whileMatch) {
      return `while (${compileExpr(whileMatch[1])}) {`;
    }

    // ---- match value ----
    const matchMatch = stmt.match(/^match\s+(.+)$/);
    if (matchMatch) {
      return `switch (${compileExpr(matchMatch[1])}) { // match`;
    }

    // ---- when value ----
    const whenMatch = stmt.match(/^when\s+(.+)$/);
    if (whenMatch) {
      const val = whenMatch[1].trim();
      // Handle range: "when 0 to 12" -- not directly translatable to switch, use if-chain approach
      // For simple values, use case
      return `case ${compileExpr(val)}: {`;
    }

    // ---- otherwise (in match = default, in if = else) ----
    if (stmt === 'otherwise') {
      // Could be default in switch or else
      if (opensBlock) {
        return `default: {`;
      }
      return `} else {`;
    }

    // ---- otherwise if ----
    const elseIfMatch = stmt.match(/^otherwise\s+if\s+(.+)$/);
    if (elseIfMatch) {
      return `} else if (${compileExpr(elseIfMatch[1])}) {`;
    }

    // ---- if condition ----
    const ifMatch = stmt.match(/^if\s+(.+)$/);
    if (ifMatch) {
      return `if (${compileExpr(ifMatch[1])}) {`;
    }

    // ---- set x is value / x is value (variable assignment) ----
    const setMatch = stmt.match(/^set\s+(\w+)\s+is\s+(.+)$/);
    if (setMatch) {
      return `let ${setMatch[1]} = ${compileExpr(setMatch[2])};`;
    }

    // ---- my x is value (this.x = value) ----
    const myMatch = stmt.match(/^my\s+(\w+)\s+is\s+(.+)$/);
    if (myMatch) {
      return `this.${myMatch[1]} = ${compileExpr(myMatch[2])};`;
    }

    // ---- x is value (variable) ----
    // Must not match things like "x is greater than" as standalone
    const varMatch = stmt.match(/^(\w+)\s+is\s+(.+)$/);
    if (varMatch && !varMatch[2].match(/^(greater|less|not)\b/) && varMatch[1] !== 'if' && varMatch[1] !== 'otherwise') {
      return `let ${varMatch[1]} = ${compileExpr(varMatch[2])};`;
    }

    // ---- x are value (alias for is, often for lists) ----
    const areMatch = stmt.match(/^(\w+)\s+are\s+(.+)$/);
    if (areMatch) {
      return `let ${areMatch[1]} = ${compileExpr(areMatch[2])};`;
    }

    // ---- fallback: treat as expression ----
    return compileExpr(stmt) + ';';
  }

  compileExpression(expr) {
    if (!expr) return expr;

    let result = expr;

    // String interpolation: "Hello {name}" -> `Hello ${name}`
    result = result.replace(/"([^"]*)"/g, (match, inner) => {
      if (inner.includes('{')) {
        const tmpl = inner.replace(/\{([^}]+)\}/g, (_, e) => '${' + this.compileExpression(e) + '}');
        return '`' + tmpl + '`';
      }
      return match;
    });

    // Pipe operator: val | fn -> fn(val)
    if (result.includes(' | ')) {
      const parts = result.split(/\s*\|\s*/);
      let compiled = this.compileExpression(parts[0]);
      for (let i = 1; i < parts.length; i++) {
        compiled = this.compileExpression(parts[i]) + '(' + compiled + ')';
      }
      return compiled;
    }

    // Boolean literals
    result = result.replace(/\byes\b/g, 'true');
    result = result.replace(/\bno\b/g, 'false');
    result = result.replace(/\bnothing\b/g, 'null');

    // Logical operators
    result = result.replace(/\band\b/g, '&&');
    result = result.replace(/\bor\b/g, '||');
    result = result.replace(/\bnot\s+/g, '!');

    // Comparison operators (multi-word, must come before single-word "is")
    result = result.replace(/\bis greater than or equal to\b/g, '>=');
    result = result.replace(/\bis less than or equal to\b/g, '<=');
    result = result.replace(/\bis greater than\b/g, '>');
    result = result.replace(/\bis less than\b/g, '<');
    result = result.replace(/\bis not\b/g, '!==');
    // "is" as equality (but not assignment -- only in expression context)
    result = result.replace(/\bis\b/g, '===');

    // "my " -> "this."
    result = result.replace(/\bmy\s+/g, 'this.');

    return result;
  }
}

// ---- Runtime Helpers (injected into compiled code) ----
const RUNTIME = `
function length(x) {
  if (x == null) return 0;
  return x.length;
}
function push(arr, item) {
  arr.push(item);
  return arr;
}
function toText(x) {
  return String(x);
}
function toNumber(x) {
  return Number(x);
}
`;

// ---- Fix generated JS: convert "function" inside class bodies to methods ----
function fixClassMethods(js) {
  const lines = js.split('\n');
  let inClass = false;
  let classDepth = 0;
  let braceCount = 0;

  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();

    if (trimmed.match(/^class\s+\w+\s*\{/)) {
      inClass = true;
      classDepth = braceCount;
    }

    if (inClass) {
      // Convert "function name(...) {" to "name(...) {" inside class
      lines[i] = lines[i].replace(/^(\s*)function\s+(\w+)\s*\(/, '$1$2(');
    }

    // Track braces
    for (const ch of lines[i]) {
      if (ch === '{') braceCount++;
      if (ch === '}') {
        braceCount--;
        if (inClass && braceCount === classDepth) {
          inClass = false;
        }
      }
    }
  }

  return lines.join('\n');
}

// ---- Fix duplicate let declarations ----
function fixDuplicateLets(js) {
  const declared = new Set();
  return js.split('\n').map(line => {
    const m = line.match(/^(\s*)let\s+(\w+)\s*=\s*(.+)$/);
    if (m) {
      const [, indent, name, value] = m;
      if (declared.has(name)) {
        return `${indent}${name} = ${value}`;
      }
      declared.add(name);
    }
    return line;
  }).join('\n');
}

// ---- Fix switch/case: add break, close nested braces ----
function fixSwitchCase(js) {
  const lines = js.split('\n');
  const result = [];
  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();
    const nextTrimmed = (i + 1 < lines.length) ? lines[i + 1].trim() : '';

    // Before a case/default/closing-of-switch, inject break + closing brace for previous case
    if ((trimmed.startsWith('case ') || trimmed.startsWith('default:')) && result.length > 0) {
      // Check if previous case block needs closing
      const prev = result[result.length - 1].trim();
      if (prev !== '{' && !prev.startsWith('case ') && !prev.startsWith('default:') && prev !== '// match' && !prev.endsWith('{ // match')) {
        const indent = lines[i].match(/^(\s*)/)[1];
        result.push(indent + '  break;');
        result.push(indent + '}');
      }
    }

    result.push(lines[i]);
  }
  return result.join('\n');
}

// ---- Sandbox Execution ----
function executeQuill(source) {
  const compiler = new QuillCompiler();
  const { js, errors } = compiler.compile(source);

  if (errors.length > 0) {
    return { output: [], errors, compiledJs: js };
  }

  // Post-process
  let finalJs = fixClassMethods(js);
  finalJs = fixDuplicateLets(finalJs);
  finalJs = fixSwitchCase(finalJs);

  const output = [];
  const captured = [];

  // Capture console.log
  const origLog = console.log;

  try {
    const fn = new Function('console', 'length', 'push', 'toText', 'toNumber',
      '"use strict";\n' + finalJs
    );

    const fakeConsole = {
      log: function() {
        const msg = Array.from(arguments).map(a => {
          if (a === null) return 'nothing';
          if (a === undefined) return 'nothing';
          if (typeof a === 'boolean') return a ? 'yes' : 'no';
          if (Array.isArray(a)) return '[' + a.map(x => typeof x === 'string' ? '"' + x + '"' : x).join(', ') + ']';
          if (typeof a === 'object') return JSON.stringify(a);
          return String(a);
        }).join(' ');
        captured.push(msg);
      },
      error: origLog,
      warn: origLog,
    };

    // Timeout protection
    const timeoutMs = 5000;
    let timedOut = false;
    const timer = setTimeout(() => { timedOut = true; }, timeoutMs);

    fn(fakeConsole, length, push, toText, toNumber);

    clearTimeout(timer);
    if (timedOut) {
      errors.push('Execution timed out after 5 seconds (possible infinite loop)');
    }

    return { output: captured, errors, compiledJs: finalJs };
  } catch (e) {
    return { output: captured, errors: [e.message], compiledJs: finalJs };
  }

  function length(x) { return (x == null) ? 0 : x.length; }
  function push(arr, item) { arr.push(item); return arr; }
  function toText(x) { return String(x); }
  function toNumber(x) { return Number(x); }
}

// ---- UI ----
const editor = document.getElementById('editor');
const lineNumbers = document.getElementById('line-numbers');
const outputEl = document.getElementById('output');
const examplesSelect = document.getElementById('examples');
const runBtn = document.getElementById('run-btn');
const shareBtn = document.getElementById('share-btn');
const clearBtn = document.getElementById('clear-btn');
const toast = document.getElementById('toast');

function updateLineNumbers() {
  const count = editor.value.split('\n').length;
  const nums = [];
  for (let i = 1; i <= count; i++) nums.push(i);
  lineNumbers.textContent = nums.join('\n');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function appendOutput(text, cls) {
  const span = document.createElement('span');
  span.className = cls || 'output-text';
  span.textContent = text + '\n';
  outputEl.appendChild(span);
}

function runCode() {
  outputEl.innerHTML = '';
  const source = editor.value;

  if (!source.trim()) {
    appendOutput('No code to run.', 'output-warn');
    return;
  }

  const { output, errors, compiledJs } = executeQuill(source);

  if (errors.length > 0) {
    for (const err of errors) {
      appendOutput('Error: ' + err, 'output-error');
    }
    if (output.length > 0) {
      appendOutput('--- Partial output ---', 'output-warn');
      for (const line of output) appendOutput(line);
    }
  } else {
    appendOutput('Compiled successfully.', 'output-success');
    if (output.length === 0) {
      appendOutput('(no output)', 'output-warn');
    } else {
      for (const line of output) appendOutput(line);
    }
  }
}

// ---- Event listeners ----
editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('scroll', () => {
  lineNumbers.scrollTop = editor.scrollTop;
});

// ---- IDE Features ----
const INDENT = '  ';
const AUTO_CLOSE = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'" };
// Quill keywords that start a block (next line should be indented)
const BLOCK_STARTERS = /^(to |if |otherwise|for each |while |describe |it |test |match |class |trait |spawn |parallel|race|select|server|database|auth|websocket )/;

function getLineAt(text, pos) {
  const start = text.lastIndexOf('\n', pos - 1) + 1;
  const end = text.indexOf('\n', pos);
  return text.substring(start, end === -1 ? text.length : end);
}

function getIndent(line) {
  const match = line.match(/^(\s*)/);
  return match ? match[1] : '';
}

function insertText(textarea, text) {
  // Use execCommand for undo support
  document.execCommand('insertText', false, text);
}

function setCursor(textarea, pos) {
  textarea.selectionStart = textarea.selectionEnd = pos;
}

editor.addEventListener('keydown', (e) => {
  const { value, selectionStart: start, selectionEnd: end } = editor;
  const hasSelection = start !== end;

  // Ctrl/Cmd + Enter to run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
    return;
  }

  // Ctrl/Cmd + / to toggle comment
  if ((e.ctrlKey || e.metaKey) && e.key === '/') {
    e.preventDefault();
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    const lineEnd = value.indexOf('\n', end);
    const selEnd = lineEnd === -1 ? value.length : lineEnd;
    const selectedText = value.substring(lineStart, selEnd);
    const lines = selectedText.split('\n');
    const allCommented = lines.every(l => l.trimStart().startsWith('-- ') || l.trim() === '');
    const newLines = lines.map(l => {
      if (l.trim() === '') return l;
      if (allCommented) {
        return l.replace(/^(\s*)-- /, '$1');
      } else {
        const indent = l.match(/^(\s*)/)[1];
        return indent + '-- ' + l.trimStart();
      }
    });
    editor.selectionStart = lineStart;
    editor.selectionEnd = selEnd;
    insertText(editor, newLines.join('\n'));
    updateLineNumbers();
    return;
  }

  // Ctrl/Cmd + D to duplicate line
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
    e.preventDefault();
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    const lineEnd = value.indexOf('\n', start);
    const line = value.substring(lineStart, lineEnd === -1 ? value.length : lineEnd);
    editor.selectionStart = lineEnd === -1 ? value.length : lineEnd;
    editor.selectionEnd = editor.selectionStart;
    insertText(editor, '\n' + line);
    updateLineNumbers();
    return;
  }

  // Ctrl/Cmd + Shift + K to delete line
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'K') {
    e.preventDefault();
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    let lineEnd = value.indexOf('\n', start);
    if (lineEnd === -1) lineEnd = value.length;
    else lineEnd += 1; // include the newline
    editor.selectionStart = lineStart;
    editor.selectionEnd = lineEnd;
    insertText(editor, '');
    updateLineNumbers();
    return;
  }

  // Tab / Shift+Tab for indent/dedent
  if (e.key === 'Tab') {
    e.preventDefault();
    if (hasSelection) {
      // Multi-line indent/dedent
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const lineEnd = value.indexOf('\n', end - 1);
      const selEnd = lineEnd === -1 ? value.length : lineEnd;
      const selectedText = value.substring(lineStart, selEnd);
      const lines = selectedText.split('\n');
      let newLines;
      if (e.shiftKey) {
        newLines = lines.map(l => l.startsWith(INDENT) ? l.substring(INDENT.length) : l.replace(/^\s/, ''));
      } else {
        newLines = lines.map(l => INDENT + l);
      }
      editor.selectionStart = lineStart;
      editor.selectionEnd = selEnd;
      insertText(editor, newLines.join('\n'));
      editor.selectionStart = lineStart;
      editor.selectionEnd = lineStart + newLines.join('\n').length;
    } else if (e.shiftKey) {
      // Dedent current line
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const line = getLineAt(value, start);
      if (line.startsWith(INDENT)) {
        const cursorOffset = start - lineStart;
        const lineEnd = value.indexOf('\n', start);
        editor.selectionStart = lineStart;
        editor.selectionEnd = lineEnd === -1 ? value.length : lineEnd;
        insertText(editor, line.substring(INDENT.length));
        setCursor(editor, lineStart + Math.max(0, cursorOffset - INDENT.length));
      }
    } else {
      insertText(editor, INDENT);
    }
    updateLineNumbers();
    return;
  }

  // Enter with auto-indent
  if (e.key === 'Enter') {
    e.preventDefault();
    const currentLine = getLineAt(value, start);
    const currentIndent = getIndent(currentLine);
    const trimmedLine = currentLine.trim();
    // Add extra indent after block starters or lines ending with ':'
    let newIndent = currentIndent;
    if (trimmedLine.endsWith(':') || BLOCK_STARTERS.test(trimmedLine)) {
      newIndent = currentIndent + INDENT;
    }
    insertText(editor, '\n' + newIndent);
    updateLineNumbers();
    return;
  }

  // Auto-close brackets and quotes
  if (AUTO_CLOSE[e.key]) {
    const closing = AUTO_CLOSE[e.key];
    // For quotes, don't auto-close if the char before is a word char
    if (e.key === '"' || e.key === "'") {
      if (start > 0 && /\w/.test(value[start - 1])) return;
      // If next char is the same quote, just skip over it
      if (value[start] === e.key) {
        e.preventDefault();
        setCursor(editor, start + 1);
        return;
      }
    }
    // If next char is the same closing bracket, skip over it
    if ((e.key === ')' || e.key === ']' || e.key === '}') && value[start] === e.key) {
      e.preventDefault();
      setCursor(editor, start + 1);
      return;
    }
    if (!hasSelection) {
      e.preventDefault();
      insertText(editor, e.key + closing);
      setCursor(editor, start + 1);
    }
    return;
  }

  // Skip over closing brackets/quotes
  if ((e.key === ')' || e.key === ']' || e.key === '}' || e.key === '"' || e.key === "'") && value[start] === e.key) {
    e.preventDefault();
    setCursor(editor, start + 1);
    return;
  }

  // Backspace: delete matching pair
  if (e.key === 'Backspace' && !hasSelection && start > 0) {
    const before = value[start - 1];
    const after = value[start];
    if (AUTO_CLOSE[before] && AUTO_CLOSE[before] === after) {
      e.preventDefault();
      editor.selectionStart = start - 1;
      editor.selectionEnd = start + 1;
      insertText(editor, '');
      updateLineNumbers();
      return;
    }
  }
});

runBtn.addEventListener('click', runCode);

clearBtn.addEventListener('click', () => {
  outputEl.innerHTML = '';
});

examplesSelect.addEventListener('change', () => {
  const key = examplesSelect.value;
  if (key && EXAMPLES[key]) {
    editor.value = EXAMPLES[key];
    updateLineNumbers();
    outputEl.innerHTML = '';
  }
  examplesSelect.value = '';
});

shareBtn.addEventListener('click', () => {
  const code = editor.value;
  const encoded = btoa(unescape(encodeURIComponent(code)));
  const url = window.location.origin + window.location.pathname + '#code=' + encoded;
  history.replaceState(null, '', '#code=' + encoded);
  navigator.clipboard.writeText(url).then(() => {
    showToast('Link copied to clipboard!');
  }).catch(() => {
    showToast('URL updated - copy from address bar');
  });
});

// Load from URL hash
function loadFromHash() {
  const hash = window.location.hash;
  if (hash.startsWith('#code=')) {
    try {
      const decoded = decodeURIComponent(escape(atob(hash.slice(6))));
      editor.value = decoded;
      updateLineNumbers();
    } catch (e) {
      // ignore bad hash
    }
  }
}

// ---- Resizable divider ----
const divider = document.getElementById('divider');
const editorPanel = document.getElementById('editor-panel');
const outputPanel = document.getElementById('output-panel');

let isDragging = false;
divider.addEventListener('mousedown', (e) => {
  isDragging = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const container = document.querySelector('.playground');
  const rect = container.getBoundingClientRect();
  const isVertical = window.innerWidth <= 768;
  if (isVertical) {
    const pct = ((e.clientY - rect.top) / rect.height) * 100;
    editorPanel.style.flex = 'none';
    editorPanel.style.height = Math.max(20, Math.min(80, pct)) + '%';
    outputPanel.style.flex = '1';
  } else {
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    editorPanel.style.flex = 'none';
    editorPanel.style.width = Math.max(20, Math.min(80, pct)) + '%';
    outputPanel.style.flex = '1';
  }
});
document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// Mobile nav toggle
document.getElementById('nav-toggle').addEventListener('click', function() {
  document.getElementById('nav-links').classList.toggle('open');
});

// Init
loadFromHash();
updateLineNumbers();
</script>
