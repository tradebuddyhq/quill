// ---- Quill Compiler (Go/WASM) ----
let __wasmReady = false;

async function initQuillWasm() {
  try {
    const go = new Go();
    const result = await WebAssembly.instantiateStreaming(
      fetch('quill.wasm'),
      go.importObject
    );
    go.run(result.instance);
    // Wait for Go to register __quill_compile
    let attempts = 0;
    while (!window.__quill_ready && attempts < 200) {
      await new Promise(r => setTimeout(r, 10));
      attempts++;
    }
    if (window.__quill_ready) {
      __wasmReady = true;
      // Update run button to show ready state
      const btn = document.getElementById('run-btn');
      if (btn && btn.textContent.includes('Loading')) {
        btn.textContent = 'Run';
        btn.disabled = false;
      }
    }
  } catch (e) {
    console.error('Failed to load Quill WASM compiler:', e);
  }
}

class QuillCompiler {
  compile(source) {
    const errors = [];
    if (!__wasmReady) {
      errors.push('Compiler is still loading. Please wait a moment and try again.');
      return { js: '', errors };
    }
    try {
      const result = window.__quill_compile(source);
      if (result.error) {
        errors.push(result.error);
        return { js: '', errors };
      }
      return { js: result.js, errors };
    } catch (e) {
      errors.push(e.message);
      return { js: '', errors };
    }
  }

}

// ---- Sandbox Execution ----
function executeQuill(source) {
  const compiler = new QuillCompiler();
  const { js, errors } = compiler.compile(source);

  if (errors.length > 0) {
    return { output: [], errors, compiledJs: js };
  }

  const captured = [];
  const origLog = console.log;

  try {
    const fn = new Function('console', '"use strict";\n' + js);

    const fakeConsole = {
      log: function() {
        const msg = Array.from(arguments).map(a => {
          if (a === null) return 'nothing';
          if (a === undefined) return 'nothing';
          if (typeof a === 'boolean') return a ? 'yes' : 'no';
          if (Array.isArray(a)) return '[' + a.map(x => typeof x === 'string' ? '"' + x + '"' : x).join(', ') + ']';
          if (typeof a === 'object') return JSON.stringify(a);
          return String(a);
        }).join(' ');
        captured.push(msg);
      },
      error: origLog,
      warn: origLog,
    };

    // Timeout protection
    const timeoutMs = 5000;
    let timedOut = false;
    const timer = setTimeout(() => { timedOut = true; }, timeoutMs);

    fn(fakeConsole);

    clearTimeout(timer);
    if (timedOut) {
      errors.push('Execution timed out after 5 seconds (possible infinite loop)');
    }

    return { output: captured, errors, compiledJs: js };
  } catch (e) {
    return { output: captured, errors: [e.message], compiledJs: js };
  }
}

// ---- UI ----
const editor = document.getElementById('editor');
const lineNumbers = document.getElementById('line-numbers');
const outputEl = document.getElementById('output');
const examplesSelect = document.getElementById('examples');
const runBtn = document.getElementById('run-btn');
const shareBtn = document.getElementById('share-btn');
const clearBtn = document.getElementById('clear-btn');
const toast = document.getElementById('toast');

function updateLineNumbers() {
  const count = editor.value.split('\n').length;
  const nums = [];
  for (let i = 1; i <= count; i++) nums.push(i);
  lineNumbers.textContent = nums.join('\n');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function appendOutput(text, cls) {
  const span = document.createElement('span');
  span.className = cls || 'output-text';
  span.textContent = text + '\n';
  outputEl.appendChild(span);
}

function runCode() {
  outputEl.innerHTML = '';
  const source = editor.value;

  if (!source.trim()) {
    appendOutput('No code to run.', 'output-warn');
    return;
  }

  const { output, errors, compiledJs } = executeQuill(source);

  if (errors.length > 0) {
    for (const err of errors) {
      appendOutput('Error: ' + err, 'output-error');
    }
    if (output.length > 0) {
      appendOutput('--- Partial output ---', 'output-warn');
      for (const line of output) appendOutput(line);
    }
  } else {
    appendOutput('Compiled successfully.', 'output-success');
    if (output.length === 0) {
      appendOutput('(no output)', 'output-warn');
    } else {
      for (const line of output) appendOutput(line);
    }
  }
}

// ---- Event listeners ----
editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('scroll', () => {
  lineNumbers.scrollTop = editor.scrollTop;
});

// ---- IDE Features ----
const INDENT = '  ';
const AUTO_CLOSE = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'" };
// Quill keywords that start a block (next line should be indented)
const BLOCK_STARTERS = /^(to |if |otherwise|for each |while |describe |it |test |match |class |trait |spawn |parallel|race|select|server|database|auth|websocket )/;

function getLineAt(text, pos) {
  const start = text.lastIndexOf('\n', pos - 1) + 1;
  const end = text.indexOf('\n', pos);
  return text.substring(start, end === -1 ? text.length : end);
}

function getIndent(line) {
  const match = line.match(/^(\s*)/);
  return match ? match[1] : '';
}

function insertText(textarea, text) {
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const before = textarea.value.substring(0, start);
  const after = textarea.value.substring(end);
  textarea.value = before + text + after;
  textarea.selectionStart = textarea.selectionEnd = start + text.length;
  textarea.dispatchEvent(new Event('input'));
}

function replaceRange(textarea, from, to, text) {
  const before = textarea.value.substring(0, from);
  const after = textarea.value.substring(to);
  textarea.value = before + text + after;
  textarea.dispatchEvent(new Event('input'));
}

function setCursor(textarea, pos) {
  textarea.selectionStart = textarea.selectionEnd = pos;
}

editor.addEventListener('keydown', (e) => {
  const { value, selectionStart: start, selectionEnd: end } = editor;
  const hasSelection = start !== end;

  // Ctrl/Cmd + Enter to run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
    return;
  }

  // Ctrl/Cmd + / to toggle comment
  if ((e.ctrlKey || e.metaKey) && e.key === '/') {
    e.preventDefault();
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    const lineEnd = value.indexOf('\n', end);
    const selEnd = lineEnd === -1 ? value.length : lineEnd;
    const selectedText = value.substring(lineStart, selEnd);
    const lines = selectedText.split('\n');
    const allCommented = lines.every(l => l.trimStart().startsWith('-- ') || l.trim() === '');
    const newLines = lines.map(l => {
      if (l.trim() === '') return l;
      if (allCommented) {
        return l.replace(/^(\s*)-- /, '$1');
      } else {
        const indent = l.match(/^(\s*)/)[1];
        return indent + '-- ' + l.trimStart();
      }
    });
    replaceRange(editor, lineStart, selEnd, newLines.join('\n'));
    updateLineNumbers();
    return;
  }

  // Ctrl/Cmd + D to duplicate line
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
    e.preventDefault();
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    const lineEnd = value.indexOf('\n', start);
    const lineEndPos = lineEnd === -1 ? value.length : lineEnd;
    const line = value.substring(lineStart, lineEndPos);
    replaceRange(editor, lineEndPos, lineEndPos, '\n' + line);
    setCursor(editor, lineEndPos + 1 + line.length);
    updateLineNumbers();
    return;
  }

  // Ctrl/Cmd + Shift + K to delete line
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'K') {
    e.preventDefault();
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    let lineEnd = value.indexOf('\n', start);
    if (lineEnd === -1) lineEnd = value.length;
    else lineEnd += 1;
    replaceRange(editor, lineStart, lineEnd, '');
    setCursor(editor, lineStart);
    updateLineNumbers();
    return;
  }

  // Tab / Shift+Tab for indent/dedent
  if (e.key === 'Tab') {
    e.preventDefault();
    if (hasSelection) {
      // Multi-line indent/dedent
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const lineEnd = value.indexOf('\n', end - 1);
      const selEnd = lineEnd === -1 ? value.length : lineEnd;
      const selectedText = value.substring(lineStart, selEnd);
      const lines = selectedText.split('\n');
      let newLines;
      if (e.shiftKey) {
        newLines = lines.map(l => l.startsWith(INDENT) ? l.substring(INDENT.length) : l.replace(/^\s/, ''));
      } else {
        newLines = lines.map(l => INDENT + l);
      }
      const newText = newLines.join('\n');
      replaceRange(editor, lineStart, selEnd, newText);
      editor.selectionStart = lineStart;
      editor.selectionEnd = lineStart + newText.length;
    } else if (e.shiftKey) {
      // Dedent current line
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const line = getLineAt(value, start);
      if (line.startsWith(INDENT)) {
        const cursorOffset = start - lineStart;
        const lineEnd = value.indexOf('\n', start);
        const lineEndPos = lineEnd === -1 ? value.length : lineEnd;
        replaceRange(editor, lineStart, lineEndPos, line.substring(INDENT.length));
        setCursor(editor, lineStart + Math.max(0, cursorOffset - INDENT.length));
      }
    } else {
      insertText(editor, INDENT);
    }
    updateLineNumbers();
    return;
  }

  // Enter with auto-indent
  if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    e.stopImmediatePropagation();
    const currentLine = getLineAt(value, start);
    const currentIndent = getIndent(currentLine);
    const trimmedLine = currentLine.trim();
    let newIndent = currentIndent;
    if (trimmedLine.endsWith(':') || BLOCK_STARTERS.test(trimmedLine)) {
      newIndent = currentIndent + INDENT;
    }
    const insertion = '\n' + newIndent;
    const newValue = value.substring(0, start) + insertion + value.substring(end);
    const newPos = start + insertion.length;
    // Use native setter to bypass any framework interference
    const nativeSetter = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set;
    nativeSetter.call(editor, newValue);
    editor.selectionStart = editor.selectionEnd = newPos;
    updateLineNumbers();
    // Debug: flash green border to confirm handler fired
    editor.style.borderLeft = '3px solid #1EB969';
    setTimeout(() => { editor.style.borderLeft = ''; }, 300);
    return false;
  }

  // Auto-close brackets and quotes
  if (AUTO_CLOSE[e.key]) {
    const closing = AUTO_CLOSE[e.key];
    // For quotes, don't auto-close if the char before is a word char
    if (e.key === '"' || e.key === "'") {
      if (start > 0 && /\w/.test(value[start - 1])) return;
      // If next char is the same quote, just skip over it
      if (value[start] === e.key) {
        e.preventDefault();
        setCursor(editor, start + 1);
        return;
      }
    }
    // If next char is the same closing bracket, skip over it
    if ((e.key === ')' || e.key === ']' || e.key === '}') && value[start] === e.key) {
      e.preventDefault();
      setCursor(editor, start + 1);
      return;
    }
    if (!hasSelection) {
      e.preventDefault();
      insertText(editor, e.key + closing);
      setCursor(editor, start + 1);
    }
    return;
  }

  // Skip over closing brackets/quotes
  if ((e.key === ')' || e.key === ']' || e.key === '}' || e.key === '"' || e.key === "'") && value[start] === e.key) {
    e.preventDefault();
    setCursor(editor, start + 1);
    return;
  }

  // Backspace: delete matching pair
  if (e.key === 'Backspace' && !hasSelection && start > 0) {
    const before = value[start - 1];
    const after = value[start];
    if (AUTO_CLOSE[before] && AUTO_CLOSE[before] === after) {
      e.preventDefault();
      replaceRange(editor, start - 1, start + 1, '');
      setCursor(editor, start - 1);
      updateLineNumbers();
      return;
    }
  }
});

runBtn.addEventListener('click', runCode);

clearBtn.addEventListener('click', () => {
  outputEl.innerHTML = '';
});

examplesSelect.addEventListener('change', () => {
  const key = examplesSelect.value;
  if (key && EXAMPLES[key]) {
    editor.value = EXAMPLES[key];
    updateLineNumbers();
    outputEl.innerHTML = '';
  }
  examplesSelect.value = '';
});

shareBtn.addEventListener('click', () => {
  const code = editor.value;
  const encoded = btoa(unescape(encodeURIComponent(code)));
  const url = window.location.origin + window.location.pathname + '#code=' + encoded;
  history.replaceState(null, '', '#code=' + encoded);
  navigator.clipboard.writeText(url).then(() => {
    showToast('Link copied to clipboard!');
  }).catch(() => {
    showToast('URL updated - copy from address bar');
  });
});

// Load from URL hash
function loadFromHash() {
  const hash = window.location.hash;
  if (hash.startsWith('#code=')) {
    try {
      const decoded = decodeURIComponent(escape(atob(hash.slice(6))));
      editor.value = decoded;
      updateLineNumbers();
    } catch (e) {
      // ignore bad hash
    }
  }
}

// ---- Resizable divider ----
const divider = document.getElementById('divider');
const editorPanel = document.getElementById('editor-panel');
const outputPanel = document.getElementById('output-panel');

let isDragging = false;
divider.addEventListener('mousedown', (e) => {
  isDragging = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const container = document.querySelector('.playground');
  const rect = container.getBoundingClientRect();
  const isVertical = window.innerWidth <= 768;
  if (isVertical) {
    const pct = ((e.clientY - rect.top) / rect.height) * 100;
    editorPanel.style.flex = 'none';
    editorPanel.style.height = Math.max(20, Math.min(80, pct)) + '%';
    outputPanel.style.flex = '1';
  } else {
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    editorPanel.style.flex = 'none';
    editorPanel.style.width = Math.max(20, Math.min(80, pct)) + '%';
    outputPanel.style.flex = '1';
  }
});
document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// Mobile nav toggle
document.getElementById('nav-toggle').addEventListener('click', function() {
  document.getElementById('nav-links').classList.toggle('open');
});

// Init
loadFromHash();
updateLineNumbers();
initQuillWasm();
</script>
</body>
